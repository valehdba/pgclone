<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="dbGrad1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2C5F8A;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dbGrad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5BA8F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3A7BC8;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#F5A623;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F7C948;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- === SOURCE DATABASE (Left) === -->
  <g transform="translate(100, 120)" filter="url(#shadow)">
    <rect x="0" y="30" width="120" height="140" rx="2" fill="url(#dbGrad1)"/>
    <ellipse cx="60" cy="30" rx="60" ry="22" fill="#5BA8F7"/>
    <ellipse cx="60" cy="30" rx="60" ry="22" fill="none" stroke="#3A7BC8" stroke-width="1.5"/>
    <ellipse cx="60" cy="80" rx="60" ry="12" fill="none" stroke="#7EC0FF" stroke-width="1" opacity="0.5"/>
    <ellipse cx="60" cy="120" rx="60" ry="12" fill="none" stroke="#7EC0FF" stroke-width="1" opacity="0.5"/>
    <ellipse cx="60" cy="170" rx="60" ry="22" fill="#2C5F8A"/>
    <ellipse cx="60" cy="170" rx="60" ry="22" fill="none" stroke="#3A7BC8" stroke-width="1.5"/>
    <rect x="20" y="45" width="30" height="4" rx="2" fill="#A8D8FF" opacity="0.7"/>
    <rect x="55" y="45" width="45" height="4" rx="2" fill="#A8D8FF" opacity="0.5"/>
    <rect x="20" y="55" width="50" height="4" rx="2" fill="#A8D8FF" opacity="0.6"/>
    <rect x="75" y="55" width="20" height="4" rx="2" fill="#A8D8FF" opacity="0.4"/>
    <rect x="20" y="95" width="40" height="4" rx="2" fill="#A8D8FF" opacity="0.7"/>
    <rect x="65" y="95" width="35" height="4" rx="2" fill="#A8D8FF" opacity="0.5"/>
    <rect x="20" y="105" width="25" height="4" rx="2" fill="#A8D8FF" opacity="0.6"/>
    <rect x="50" y="105" width="45" height="4" rx="2" fill="#A8D8FF" opacity="0.4"/>
    <rect x="20" y="135" width="35" height="4" rx="2" fill="#A8D8FF" opacity="0.7"/>
    <rect x="60" y="135" width="40" height="4" rx="2" fill="#A8D8FF" opacity="0.5"/>
    <rect x="20" y="145" width="55" height="4" rx="2" fill="#A8D8FF" opacity="0.6"/>
  </g>

  <!-- === TARGET DATABASE (Right) === -->
  <g transform="translate(295, 120)" filter="url(#shadow)">
    <rect x="0" y="30" width="120" height="140" rx="2" fill="url(#dbGrad2)"/>
    <ellipse cx="60" cy="30" rx="60" ry="22" fill="#6DC0FF"/>
    <ellipse cx="60" cy="30" rx="60" ry="22" fill="none" stroke="#4A9DE0" stroke-width="1.5"/>
    <ellipse cx="60" cy="80" rx="60" ry="12" fill="none" stroke="#90D4FF" stroke-width="1" opacity="0.5"/>
    <ellipse cx="60" cy="120" rx="60" ry="12" fill="none" stroke="#90D4FF" stroke-width="1" opacity="0.5"/>
    <ellipse cx="60" cy="170" rx="60" ry="22" fill="#3A7BC8"/>
    <ellipse cx="60" cy="170" rx="60" ry="22" fill="none" stroke="#4A9DE0" stroke-width="1.5"/>
    <rect x="20" y="45" width="30" height="4" rx="2" fill="#C8EAFF" opacity="0.7"/>
    <rect x="55" y="45" width="45" height="4" rx="2" fill="#C8EAFF" opacity="0.5"/>
    <rect x="20" y="55" width="50" height="4" rx="2" fill="#C8EAFF" opacity="0.6"/>
    <rect x="75" y="55" width="20" height="4" rx="2" fill="#C8EAFF" opacity="0.4"/>
    <rect x="20" y="95" width="40" height="4" rx="2" fill="#C8EAFF" opacity="0.7"/>
    <rect x="65" y="95" width="35" height="4" rx="2" fill="#C8EAFF" opacity="0.5"/>
    <rect x="20" y="105" width="25" height="4" rx="2" fill="#C8EAFF" opacity="0.6"/>
    <rect x="50" y="105" width="45" height="4" rx="2" fill="#C8EAFF" opacity="0.4"/>
    <rect x="20" y="135" width="35" height="4" rx="2" fill="#C8EAFF" opacity="0.5"/>
    <rect x="60" y="135" width="40" height="4" rx="2" fill="#C8EAFF" opacity="0.3"/>
  </g>

  <!-- === CLONE ARROW (Center) === -->
  <g filter="url(#glow)">
    <rect x="225" y="210" width="65" height="12" rx="6" fill="url(#arrowGrad)"/>
    <polygon points="290,195 320,216 290,237" fill="url(#arrowGrad)"/>
    <circle cx="240" cy="210" r="3" fill="#F7C948" opacity="0.8">
      <animate attributeName="cx" values="230;310" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.8;0" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="235" cy="222" r="2.5" fill="#F5A623" opacity="0.6">
      <animate attributeName="cx" values="225;305" dur="1.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0" dur="1.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="245" cy="216" r="2" fill="#FFDC73" opacity="0.7">
      <animate attributeName="cx" values="235;315" dur="1.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0" dur="1.3s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- === POSTGRESQL ELEPHANT ICON (Top center) === -->
  <g transform="translate(230, 55)">
    <circle cx="26" cy="26" r="24" fill="#336791" stroke="#264D73" stroke-width="2"/>
    <path d="M18,18 C16,14 20,10 26,12 C32,10 36,14 34,18 C36,22 35,28 32,32 C30,35 28,38 26,40 C24,38 22,35 20,32 C17,28 16,22 18,18Z" fill="#fff" opacity="0.9"/>
    <circle cx="23" cy="20" r="2.5" fill="#336791"/>
    <path d="M26,28 C24,32 25,36 26,40" fill="none" stroke="#336791" stroke-width="1.5" stroke-linecap="round"/>
    <path d="M30,26 C32,28 33,31 31,33" fill="none" stroke="#E0E0E0" stroke-width="1.8" stroke-linecap="round"/>
  </g>

  <!-- === TEXT: pgclone === -->
  <text x="256" y="390" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace" font-size="56" font-weight="700" fill="#2C5F8A" letter-spacing="-1">
    pg<tspan fill="#F5A623">clone</tspan>
  </text>

  <!-- === TAGLINE === -->
  <text x="256" y="420" text-anchor="middle" font-family="'JetBrains Mono', 'Fira Code', monospace" font-size="14" fill="#6B8DAF" letter-spacing="3" text-transform="uppercase">
    CLONE DATABASES FROM SQL
  </text>

  <!-- === Version badge === -->
  <g transform="translate(358, 360)">
    <rect x="0" y="0" width="52" height="20" rx="10" fill="#F5A623" opacity="0.9"/>
    <text x="26" y="14" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="10" font-weight="600" fill="#fff">v2.1.2</text>
  </g>
</svg>
